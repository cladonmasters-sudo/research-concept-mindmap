<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Mind Map</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>Research Mind Map</h1>
    <p>A simple brainstorming space for restarting your research ideas.</p>
  </header>

  <main>
    <aside class="panel">
      <h2>Start Thinking</h2>

      <label>Research Title / Main Idea</label>
      <textarea id="researchTitle" placeholder="Type your research title or main idea..."></textarea>

      <label>New Idea</label>
      <input id="conceptInput" type="text" placeholder="Example: learner needs" />

      <label>Short Note</label>
      <textarea id="conceptNotes" placeholder="Write a short note..."></textarea>

      <button onclick="startMindMap()">Start Mind Map</button>
      <button onclick="addConcept()">Add Idea</button>
      <button onclick="clearInputs()">Clear Text</button>
      <button onclick="saveProject()">Save</button>
      <button onclick="loadProject()">Load</button>
      <button onclick="exportPNG()">Export PNG</button>
      <button onclick="window.print()">Export PDF</button>

      <p class="hint">
        Tip: Drag the cards around while you brainstorm.
      </p>
    </aside>

    <section class="canvas-area">
      <h2>Mind Map Canvas</h2>
      <div id="mindmap"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
